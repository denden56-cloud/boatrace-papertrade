name: settle
# 毎朝(JST 7:30)前日の公式結果で仮想投票を採点し、
# 選手統計スナップショットとダッシュボードを更新する。
on:
  schedule:
    - cron: "30 22 * * *"  # UTC 22:30 = JST 7:30
  workflow_dispatch:

concurrency:
  group: state
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  settle:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - run: python -m boatrace.cloud settle
      - name: commit state
        run: |
          git config user.name "papertrade-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add state docs
          if ! git diff --cached --quiet; then
            git commit -m "settle $(TZ=Asia/Tokyo date +%F)"
            git pull --rebase origin main
            git push
          fi
